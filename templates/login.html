{% extends "base.html" %}
{% block title %}管理员登录 - L丶YOU的博客{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-lock"></i>
            <h1>管理员登录</h1>
            <p class="text-muted">请输入管理员账号和密码</p>
        </div>
        <form method="post" class="login-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> 用户名
                </label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="请输入用户名" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-key"></i> 密码
                </label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="fas fa-sign-in-alt"></i> 登录
            </button>
        </form>
        <div class="login-footer">
            <a href="{{ url_for('index') }}" class="text-muted">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>
        </div>
    </div>
</div>
{% endblock %}
