{% extends "base.html" %}
{% block title %}修改密码 - L丶YOU的博客{% endblock %}
{% block content %}
<div class="change-password-page">
    <div class="page-header">
        <h1><i class="fas fa-key"></i> 修改管理员密码</h1>
    </div>

    <div class="password-card">
        <form method="post" class="password-form" id="passwordForm">
            <div class="form-group">
                <label for="current_password">
                    <i class="fas fa-lock"></i> 当前密码
                </label>
                <input type="password" id="current_password" name="current_password"
                       class="form-control" required autocomplete="current-password"
                       placeholder="输入当前密码">
            </div>

            <div class="form-group">
                <label for="new_password">
                    <i class="fas fa-key"></i> 新密码
                </label>
                <input type="password" id="new_password" name="new_password"
                       class="form-control" required minlength="6"
                       autocomplete="new-password" placeholder="至少 6 个字符">
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-check-circle"></i> 确认新密码
                </label>
                <input type="password" id="confirm_password" name="confirm_password"
                       class="form-control" required autocomplete="new-password"
                       placeholder="再次输入新密码">
                <span id="passwordMatch" class="field-hint"></span>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('admin') }}" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i> 返回管理
                </a>
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save"></i> 保存新密码
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const newPass = document.getElementById('new_password');
    const confirmPass = document.getElementById('confirm_password');
    const matchHint = document.getElementById('passwordMatch');
    const strengthBar = document.getElementById('strengthBar');

    // Password strength indicator
    newPass.addEventListener('input', function() {
        const val = this.value;
        let strength = 0;
        if (val.length >= 6) strength += 1;
        if (val.length >= 10) strength += 1;
        if (/[A-Z]/.test(val)) strength += 1;
        if (/[0-9]/.test(val)) strength += 1;
        if (/[^A-Za-z0-9]/.test(val)) strength += 1;

        const levels = ['', 'weak', 'fair', 'good', 'strong', 'very-strong'];
        const colors = ['', '#ef4444', '#f59e0b', '#22c55e', '#22c55e', '#6366f1'];
        const labels = ['', '弱', '较弱', '一般', '强', '非常强'];

        const level = Math.min(strength, 5);
        strengthBar.className = 'strength-bar ' + levels[level];
        strengthBar.style.width = (level * 20) + '%';
        strengthBar.style.background = colors[level];
        strengthBar.textContent = labels[level];
    });

    // Password match check
    function checkMatch() {
        const newVal = newPass.value;
        const confirmVal = confirmPass.value;
        if (!confirmVal) {
            matchHint.textContent = '';
            matchHint.className = 'field-hint';
        } else if (newVal === confirmVal) {
            matchHint.textContent = '✓ 密码一致';
            matchHint.className = 'field-hint match';
        } else {
            matchHint.textContent = '✗ 密码不一致';
            matchHint.className = 'field-hint no-match';
        }
    }
    newPass.addEventListener('input', checkMatch);
    confirmPass.addEventListener('input', checkMatch);
});
</script>
{% endblock %}
